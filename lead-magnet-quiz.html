<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: готов ли ваш подросток выбрать профессию? | Самат Панов</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f7f5;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 3rem;
  }
  .quiz-wrap {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e8e6df;
    padding: 2rem;
    max-width: 580px;
    width: 100%;
  }
  .progress-bar {
    height: 4px;
    background: #e8e6df;
    border-radius: 2px;
    margin-bottom: 1.75rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #1D6B5A;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .step-label {
    font-size: 13px;
    color: #888780;
    margin-bottom: 0.6rem;
    display: flex;
    justify-content: space-between;
  }
  .question-text {
    font-size: 18px;
    font-weight: 500;
    color: #2C2C2A;
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }
  .options-grid { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    font-size: 15px;
    color: #2C2C2A;
    cursor: pointer;
    transition: all 0.15s ease;
    line-height: 1.4;
  }
  .opt-btn:hover { border-color: #1D6B5A; background: #E1F5EE; color: #04342C; }
  .opt-btn.selected { border-color: #1D6B5A; background: #E1F5EE; color: #04342C; font-weight: 500; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btn-back { background: none; border: none; font-size: 14px; color: #888780; cursor: pointer; padding: 8px 0; }
  .btn-back:hover { color: #2C2C2A; }
  .btn-next {
    background: #1D6B5A;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-next:not(:disabled):hover { opacity: 0.88; }

  /* Intro */
  .intro-title { font-size: 22px; font-weight: 600; color: #2C2C2A; line-height: 1.35; margin-bottom: 0.75rem; }
  .intro-sub { font-size: 15px; color: #5F5E5A; line-height: 1.6; margin-bottom: 1.5rem; }
  .intro-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.75rem; }
  .chip {
    background: #f7f7f5;
    border: 1px solid #e8e6df;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    color: #5F5E5A;
  }
  .btn-start {
    width: 100%;
    background: #1D6B5A;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-start:hover { opacity: 0.88; }

  /* Result */
  .result-badge {
    display: inline-flex;
    align-items: center;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 1rem;
  }
  .badge-yellow { background: #FAEEDA; color: #633806; }
  .badge-orange { background: #FAECE7; color: #4A1B0C; }
  .badge-red { background: #FCEBEB; color: #501313; }
  .result-title { font-size: 21px; font-weight: 600; color: #2C2C2A; margin-bottom: 0.75rem; line-height: 1.35; }
  .result-desc { font-size: 15px; color: #5F5E5A; line-height: 1.7; margin-bottom: 1.5rem; }
  .tips-card { background: #f7f7f5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .tips-label { font-size: 11px; font-weight: 700; color: #888780; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.75rem; }
  .tip-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 14px; color: #2C2C2A; line-height: 1.5; }
  .tip-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: #E1F5EE; color: #085041;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .cta-block { background: #E1F5EE; border: 1px solid #5DCAA5; border-radius: 12px; padding: 1.25rem 1.5rem; }
  .cta-title { font-size: 15px; font-weight: 600; color: #085041; margin-bottom: 0.4rem; }
  .cta-sub { font-size: 13px; color: #0F6E56; margin-bottom: 1rem; line-height: 1.5; }
  .btn-wa {
    display: inline-flex; align-items: center; gap: 8px;
    background: #1D6B5A; color: #fff; text-decoration: none;
    border-radius: 10px; padding: 12px 22px;
    font-size: 14px; font-weight: 600; transition: opacity 0.15s;
  }
  .btn-wa:hover { opacity: 0.85; }
  .btn-wa svg { width: 18px; height: 18px; }
  .restart-link { display: block; text-align: center; margin-top: 1.25rem; font-size: 13px; color: #888780; cursor: pointer; }
  .restart-link:hover { color: #2C2C2A; }

  @media (max-width: 480px) {
    body { padding: 0; }
    .quiz-wrap { border-radius: 0; border: none; padding: 1.5rem 1rem 2rem; min-height: 100vh; }
    .intro-title, .result-title { font-size: 19px; }
    .question-text { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="quiz-wrap">

  <div id="intro">
    <p class="intro-title">Готов ли ваш подросток к осознанному выбору профессии?</p>
    <p class="intro-sub">8 вопросов — и вы узнаете тип ситуации вашего ребёнка и конкретные шаги, которые помогут двигаться вперёд.</p>
    <div class="intro-chips">
      <span class="chip">⏱ 3 минуты</span>
      <span class="chip">👨‍👩‍👦 для родителей 13–17 лет</span>
      <span class="chip">🔒 бесплатно</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">Пройти тест →</button>
  </div>

  <div id="quiz-body" style="display:none">
    <div class="step-label">
      <span id="step-counter">Вопрос 1 из 8</span>
      <span id="step-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <p class="question-text" id="q-text"></p>
    <div class="options-grid" id="options-grid"></div>
    <div class="nav-row">
      <button class="btn-back" id="btn-back" onclick="goBack()">← Назад</button>
      <button class="btn-next" id="btn-next" onclick="goNext()" disabled>Далее →</button>
    </div>
  </div>

  <div id="result-wrap" style="display:none"></div>

</div>

<script>
const questions = [
  {
    q: "Сколько лет вашему подростку?",
    opts: ["13–14 лет", "15–16 лет", "17 лет и старше"],
    scores: [0, 1, 2]
  },
  {
    q: "Когда вы спрашиваете о профессии, он обычно...",
    opts: [
      "Молчит или уходит от темы",
      "Говорит «не знаю» и раздражается",
      "Называет что-то, но без особой уверенности",
      "Уже понимает направление, но хочет разобраться глубже"
    ],
    scores: [2, 2, 1, 0]
  },
  {
    q: "Как он относится к учёбе?",
    opts: [
      "Учится хорошо, но не понимает, зачем это нужно",
      "Учится средне — интерес к предметам слабый",
      "Не хочет учиться, мотивации нет",
      "Учится с интересом хотя бы к нескольким предметам"
    ],
    scores: [1, 1, 2, 0]
  },
  {
    q: "Есть ли у него занятия или хобби вне школы?",
    opts: [
      "Да, несколько — спорт, творчество, секции",
      "Есть одно постоянное занятие",
      "Раньше было, сейчас бросил",
      "Нет ничего, только школа и телефон"
    ],
    scores: [0, 0, 1, 2]
  },
  {
    q: "Вы знаете, что ему по-настоящему нравится делать?",
    opts: [
      "Да, точно знаю — он сам говорит об этом",
      "Примерно понимаю, но не уверена",
      "Не знаю, он сам не понимает",
      "Нравится всё понемногу или ничего конкретного"
    ],
    scores: [0, 1, 2, 1]
  },
  {
    q: "Он говорит с вами о своём будущем?",
    opts: [
      "Совсем нет — тема закрытая",
      "Редко, и то без деталей",
      "Иногда — когда сам захочет",
      "Да, мы открыто обсуждаем планы"
    ],
    scores: [2, 2, 1, 0]
  },
  {
    q: "Сколько времени до окончания школы?",
    opts: [
      "Больше 3 лет — времени много",
      "2–3 года — уже думаем об этом",
      "Меньше 2 лет — ЕНТ/поступление скоро",
      "Последний год — решение нужно сейчас"
    ],
    scores: [0, 1, 2, 3]
  },
  {
    q: "Что вас больше всего беспокоит прямо сейчас?",
    opts: [
      "Подросток вообще не понимает себя и свои интересы",
      "Есть интересы, но непонятно, как связать их с профессией",
      "Давление ЕНТ и поступления — нет времени разбираться",
      "Боюсь, что выберет «неправильно» или под чужим влиянием"
    ],
    scores: [2, 1, 2, 1]
  }
];

const results = [
  {
    range: [0, 5],
    badge: "🟡 Исследователь",
    badgeClass: "badge-yellow",
    title: "Ваш подросток в начале пути — и это нормально",
    desc: "Неопределённость в 13–15 лет — это не проблема, а возраст. У него ещё есть время, но уже сейчас важно помочь ему начать исследовать себя — через интересы, хобби, общение с людьми разных профессий. Давление и «правильные ответы» здесь не помогут.",
    tips: [
      "Разговаривайте о профессиях без давления — через истории других людей",
      "Поддержите любое новое хобби или занятие, даже если оно кажется «несерьёзным»",
      "Дайте подростку право не знать — и помогите ему исследовать"
    ]
  },
  {
    range: [6, 11],
    badge: "🟠 На перепутье",
    badgeClass: "badge-orange",
    title: "Интересы есть, но связи с профессией пока нет",
    desc: "Ваш подросток что-то знает о себе, но не умеет это «перевести» в конкретное направление. Он чувствует неопределённость, и это вызывает тревогу — у него и у вас. Здесь важна структурированная работа: не ещё один тест, а глубокий разбор с инструментами.",
    tips: [
      "Помогите подростку увидеть связь между тем, что он любит и что умеет",
      "Предложите пообщаться с реальными людьми в интересных ему профессиях",
      "Избегайте фразы «тебе нужно определиться» — замените на «давай разберёмся вместе»"
    ]
  },
  {
    range: [12, 100],
    badge: "🔴 Давление нарастает",
    badgeClass: "badge-red",
    title: "Времени мало, тревога высокая — нужен чёткий план",
    desc: "У вашего подростка мало времени до важных решений, а ясности пока нет. Это создаёт стресс и для него, и для вас. В этой ситуации хаотичные советы и поиск в интернете не помогут — нужен структурный подход, который за короткое время даст конкретный результат.",
    tips: [
      "Не ждите, что «само придёт» — действуйте уже сейчас",
      "Снизьте давление в разговорах: подросток в стрессе думает хуже",
      "Ищите поддержку эксперта, который работает именно с подростками"
    ]
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz-body').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('step-counter').textContent = 'Вопрос ' + (current + 1) + ' из ' + questions.length;
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('step-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.opts.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[current] === i ? ' selected' : '');
    btn.textContent = opt;
    btn.onclick = function() { selectOption(i); };
    grid.appendChild(btn);
  });

  document.getElementById('btn-next').disabled = answers[current] === null;
  document.getElementById('btn-back').style.visibility = current === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').textContent = current === questions.length - 1 ? 'Узнать результат →' : 'Далее →';
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.opt-btn').forEach(function(b, idx) {
    b.classList.toggle('selected', idx === i);
  });
  document.getElementById('btn-next').disabled = false;
}

function goNext() {
  if (answers[current] === null) return;
  if (current < questions.length - 1) { current++; renderQuestion(); }
  else showResult();
}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function calcScore() {
  var total = 0;
  answers.forEach(function(a, qi) { if (a !== null) total += questions[qi].scores[a]; });
  return total;
}

function showResult() {
  document.getElementById('quiz-body').style.display = 'none';
  var score = calcScore();
  var r = results[0];
  if (score >= 6 && score <= 11) r = results[1];
  if (score >= 12) r = results[2];

  var waText = encodeURIComponent('Здравствуйте, Самат! Я прошла тест и получила результат: "' + r.title + '". Хочу узнать подробнее о тренинге.');
  var waUrl = 'https://wa.me/77078622268?text=' + waText;

  var wrap = document.getElementById('result-wrap');
  wrap.style.display = 'block';
  wrap.innerHTML = '<span class="result-badge ' + r.badgeClass + '">' + r.badge + '</span>' +
    '<p class="result-title">' + r.title + '</p>' +
    '<p class="result-desc">' + r.desc + '</p>' +
    '<div class="tips-card"><p class="tips-label">Что поможет прямо сейчас</p>' +
    r.tips.map(function(t, i) {
      return '<div class="tip-item"><span class="tip-dot">' + (i+1) + '</span><span>' + t + '</span></div>';
    }).join('') + '</div>' +
    '<div class="cta-block"><p class="cta-title">Хотите разобраться глубже?</p>' +
    '<p class="cta-sub">Самат Панов лично ответит на ваши вопросы и расскажет, подойдёт ли тренинг вашему подростку. Бесплатно, без навязывания.</p>' +
    '<a class="btn-wa" href="' + waUrl + '" target="_blank">' +
    '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>' +
    ' Написать в WhatsApp</a></div>' +
    '<span class="restart-link" onclick="restart()">← Пройти тест заново</span>';
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('result-wrap').innerHTML = '';
  document.getElementById('quiz-body').style.display = 'block';
  renderQuestion();
}
</script>
</body>
</html>
